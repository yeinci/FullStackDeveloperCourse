<!DOCTYPE html>
<html lang="en">
<head>
    <title>Blackjack App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="title">Blackjack</h1>
    <p id="text-box" class="box">Want to play a round?</p>
    <div class="players-container">
        <div class="player box">
            <p id="player-title" class="player-title">Player</p>
            <p id="player-cards">Cards: </p>
            <p id="player-sum">Sum: </p>
        </div>
        <div class="player box">
            <p class="player-title">Dealer</p>
            <p id="dealer-cards">Cards: </p>
            <p id="dealer-sum">Sum: </p>
        </div>
    </div>
    <div class="box">
        <input id="bet-input" class="input" type="number" min="1" max="1000000000" placeholder="Enter bet amount">
        <p id="bet-amount" class="no-margin">Enter bet amount to start the game</p>
        <button id="hit-btn" class="btn">Hit</button>
        <button id="stand-btn" class="btn">Stand</button>
    </div>
    <div class="box">
        <input id="name-input" class="input" type="text" maxlength="10" placeholder="Enter player name">
        <p id="name-and-balance">Player: 100$</p>
    </div>
    
    <script src="script.js"></script>
</body>
</html>

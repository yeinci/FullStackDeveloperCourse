<!DOCTYPE html>
<html lang="en">
    
<head>
    <title>Unit Converter App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="hero">
        <h1>Metric to Imperial Unit Conversion</h1>
        <input id="value-input" type="number" placeholder="Metric">
        <button id="convert-btn">Convert</button>
    </section>
    <section class="result">
        <article class="result-box">
            <h2 class="result-box-title">Length (Meter to Feet)</h2>
            <p id="length-result">0 Meters = 0 Feet</p>
        </article>
        <article class="result-box">
            <h2 class="result-box-title">Volume (Liter to Gallon)</h2>
            <p id="volume-result">0 Liters = 0 Gallons</p>
        </article>
        <article class="result-box">
            <h2 class="result-box-title">Mass (Kilogram to Pound)</h2>
            <p id="mass-result">0 Kilograms = 0 Pounds</p>
        </article>
    </section>
    <script src="script.js"></script>
</body>
</html>
